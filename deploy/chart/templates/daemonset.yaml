{{- if and (not .Values.singlePod) .Values.tiers.core.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nodevitals-core
  labels:
    app.kubernetes.io/name: nodevitals
    app.kubernetes.io/component: core
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nodevitals
      app.kubernetes.io/component: core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nodevitals
        app.kubernetes.io/component: core
      annotations:
        {{- include "nodevitals.configChecksums" (dict "ctx" . "tier" "core") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nodevitals
          image: {{ include "nodevitals.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["-config", "/etc/nodevitals/config.yaml"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- with (include "nodevitals.webhookSecretEnv" .) }}{{ . | nindent 12 }}{{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: config
              mountPath: /etc/nodevitals
              readOnly: true
          resources:
{{ toYaml .Values.resources | indent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: config
          configMap:
            name: nodevitals-core
{{- end }}
