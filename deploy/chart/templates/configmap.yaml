{{- if .Values.tiers.core.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: nodevitals-core
  labels:
    app.kubernetes.io/name: nodevitals
    app.kubernetes.io/component: core
data:
  config.yaml: |
    tier: core
    intervalSeconds: {{ .Values.intervalSeconds }}
    procRoot: /host/proc
    sysRoot: /host/sys
    rules:
{{ toYaml .Values.rules | indent 6 }}
    sinks:
      metrics:
        enabled: true
        listenAddr: ":{{ .Values.metrics.port }}"
      # webhook.secret 은 ${WEBHOOK_SECRET_N} placeholder 로만 렌더 — 실제 키는 nodevitals-webhooks Secret 에서 env(secretKeyRef) 주입 (ConfigMap 평문 아님)
      webhook:
{{ include "nodevitals.webhookConfig" . | indent 8 }}
{{- end }}
