{{- if and (not .Values.singlePod) .Values.tiers.gpu.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nodevitals-gpu
  labels:
    app.kubernetes.io/name: nodevitals
    app.kubernetes.io/component: gpu
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nodevitals
      app.kubernetes.io/component: gpu
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nodevitals
        app.kubernetes.io/component: gpu
      annotations:
        {{- include "nodevitals.configChecksums" (dict "ctx" . "tier" "gpu") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.tiers.gpu.runtimeClassName }}
      runtimeClassName: {{ . | quote }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: nodevitals
          image: {{ include "nodevitals.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["-config", "/etc/nodevitals/config.yaml"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- with (include "nodevitals.webhookSecretEnv" .) }}{{ . | nindent 12 }}{{- end }}
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "utility"
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/nodevitals
              readOnly: true
          resources:
{{ toYaml .Values.resources | indent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: nodevitals-gpu
{{- end }}
