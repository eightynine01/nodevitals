{{- if .Values.tiers.smart.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nodevitals-smart
  labels:
    app.kubernetes.io/name: nodevitals
    app.kubernetes.io/component: smart
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nodevitals
      app.kubernetes.io/component: smart
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nodevitals
        app.kubernetes.io/component: smart
      annotations:
        {{- include "nodevitals.configChecksums" (dict "ctx" . "tier" "smart") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: nodevitals
          image: {{ include "nodevitals.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["-config", "/etc/nodevitals/config.yaml"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- with (include "nodevitals.webhookSecretEnv" .) }}{{ . | nindent 12 }}{{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            {{- if .Values.tiers.smart.privileged }}
            privileged: true
            # privileged 와 allowPrivilegeEscalation:false 는 API validation 상충 —
            # privileged 를 켤 때는 반드시 함께 true.
            allowPrivilegeEscalation: true
            {{- else }}
            allowPrivilegeEscalation: false
            {{- end }}
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
              add: ["SYS_RAWIO", "SYS_ADMIN"]
          volumeMounts:
            - name: dev
              mountPath: /host/dev
              readOnly: true
            - name: config
              mountPath: /etc/nodevitals
              readOnly: true
          resources:
{{ toYaml .Values.resources | indent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: config
          configMap:
            name: nodevitals-smart
{{- end }}
