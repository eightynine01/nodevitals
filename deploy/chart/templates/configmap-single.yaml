{{- if .Values.singlePod }}
{{- $tiers := splitList " " (include "nodevitals.enabledTiers" .) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: nodevitals
  labels:
    app.kubernetes.io/name: nodevitals
    app.kubernetes.io/component: single
data:
  config.yaml: |
    tiers: [{{ join ", " $tiers }}]
    intervalSeconds: {{ .Values.intervalSeconds }}
    procRoot: /host/proc
    sysRoot: /host/sys
    devRoot: /host/dev
    # 활성 tier 의 룰을 한 목록으로 합친다. 이벤트 엔진은 metric 이름으로
    # 매칭하고 tier 별 metric 이름은 서로 겹치지 않으므로(load1·cpu_util_pct /
    # smart_*·nvme_* / gpu_*) 합쳐도 각 룰은 자기 tier 샘플에만 걸린다.
    rules:
{{- if .Values.tiers.core.enabled }}
{{ toYaml .Values.rules | indent 6 }}
{{- end }}
{{- if .Values.tiers.smart.enabled }}
{{ toYaml .Values.smartRules | indent 6 }}
{{- end }}
{{- if .Values.tiers.gpu.enabled }}
{{ toYaml .Values.gpuRules | indent 6 }}
{{- end }}
    sinks:
      metrics:
        enabled: true
        listenAddr: ":{{ .Values.metrics.port }}"
      # webhook.secret 은 ${WEBHOOK_SECRET_N} placeholder 로만 렌더 — 실제 키는 nodevitals-webhooks Secret 에서 env(secretKeyRef) 주입 (ConfigMap 평문 아님)
      webhook:
{{ include "nodevitals.webhookConfig" . | indent 8 }}
{{- end }}
