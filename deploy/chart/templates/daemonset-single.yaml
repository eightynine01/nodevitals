{{- if .Values.singlePod }}
{{- $tiers := splitList " " (include "nodevitals.enabledTiers" .) }}
{{- $gpuOnly := and .Values.tiers.gpu.enabled (eq (len $tiers) 1) }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nodevitals
  labels:
    app.kubernetes.io/name: nodevitals
    app.kubernetes.io/component: single
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nodevitals
      app.kubernetes.io/component: single
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nodevitals
        app.kubernetes.io/component: single
      annotations:
        {{- include "nodevitals.configChecksums" (dict "ctx" . "tier" "single") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- if .Values.tiers.gpu.enabled }}
      {{- with .Values.tiers.gpu.runtimeClassName }}
      # runtimeClassName 은 pod 단위라 합쳐진 pod 전체가 NVIDIA 런타임으로 뜬다.
      # core/smart 동작에는 영향이 없다(라이브러리 주입만 추가).
      runtimeClassName: {{ . | quote }}
      {{- end }}
      {{- end }}
      {{- if $gpuOnly }}
      # gpu 단독일 때만 GPU 노드로 한정한다. core/smart 가 함께 있으면 전 노드가
      # 대상이어야 하므로 nodeSelector 를 걸지 않고, GPU 없는 노드에서는
      # 에이전트가 gpu collector 만 건너뛴다.
      nodeSelector:
        nvidia.com/gpu.present: "true"
      {{- end }}
      {{- if .Values.tiers.gpu.enabled }}
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      {{- end }}
      {{- if not .Values.tiers.smart.enabled }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      {{- end }}
      containers:
        - name: nodevitals
          image: {{ include "nodevitals.singlePodImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["-config", "/etc/nodevitals/config.yaml"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- with (include "nodevitals.webhookSecretEnv" .) }}{{ . | nindent 12 }}{{- end }}
            {{- if .Values.tiers.gpu.enabled }}
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "utility"
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
          securityContext:
            {{- if .Values.tiers.smart.enabled }}
            # smart 를 함께 돌리면 컨테이너가 하나뿐이라 /proc·/sys 수집까지
            # 같은 권한을 쓴다 — 최소권한을 유지하려면 singlePod 를 끄고 tier
            # 별 DaemonSet 으로 분리한다.
            runAsUser: 0
            runAsNonRoot: false
            {{- if .Values.tiers.smart.privileged }}
            privileged: true
            allowPrivilegeEscalation: true
            {{- else }}
            allowPrivilegeEscalation: false
            {{- end }}
            {{- else }}
            allowPrivilegeEscalation: false
            {{- end }}
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
              {{- if .Values.tiers.smart.enabled }}
              add: ["SYS_RAWIO", "SYS_ADMIN"]
              {{- end }}
          volumeMounts:
            {{- if .Values.tiers.core.enabled }}
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            {{- end }}
            {{- if .Values.tiers.smart.enabled }}
            - name: dev
              mountPath: /host/dev
              readOnly: true
            {{- end }}
            - name: config
              mountPath: /etc/nodevitals
              readOnly: true
          resources:
{{ toYaml .Values.resources | indent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        {{- if .Values.tiers.core.enabled }}
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        {{- end }}
        {{- if .Values.tiers.smart.enabled }}
        - name: dev
          hostPath:
            path: /dev
        {{- end }}
        - name: config
          configMap:
            name: nodevitals
{{- end }}
